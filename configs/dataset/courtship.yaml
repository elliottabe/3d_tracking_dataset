# @package _global_

defaults:
  - preprocessing
  - postprocessing

dataset:
  name: courtship
  env_name: courtship
  version: Data_analysis
  train: True

  concat:
    input_pattern: 'postprocessing/ik_output_${anatomy.name}_${dataset.name}*.h5'
    output_file: 'ik_output_combined_${anatomy.name}_${dataset.name}.h5'
    enable_jax: True

# Multi-fly cleanup: identity relink runs first (sustained ID swaps),
# then centroid_jump masks any remaining single-frame outliers.
# These overrides land on cfg.preprocessing.* (root) so the preprocess
# script picks them up.
preprocessing:
  filtering:
    confidence:
      threshold: 0.3            # Relaxed from 0.5 — male fly KP conf is systematically
                                # lower during courtship (smaller body, frequent
                                # occlusion by female); 0.5 blanks ~40% of male
                                # frame-kps and collapses STAC to NaN.
    identity_relink:
      enabled: true
    centroid_jump:
      enabled: true
      window: 3                 # Mask 3 frames on each side of a jump
      threshold_mm: 1.5         # Tightened from 2.0 for courtship
    nearest_fill:
      enabled: true             # STAC-mjx trajectory LM rejects any step with
                                # NaN in residual; long edge-NaN runs on
                                # occluded male limbs poison the whole clip
                                # and freeze joint DOFs at zero. Backstop:
                                # LOCF/BOCF per KP after spline interpolation.
      min_valid_frac: 0.05      # Skip KPs with <5% finite frames — filling
                                # those would plant a constant phantom.
  pair_validity:
    enabled: true
    # Identity-collapse detector: flag frames where fly0 and fly1 Scutellum
    # are closer than ~half a Drosophila body length (≈1 mm). The JARVIS
    # multi-peak tracker can drop one track onto the other when one fly is
    # occluded, producing two tracks on the same physical animal; this
    # threshold catches the fallout without re-running tracking.
    ground_epsilon_mm: 0.5
    min_pair_separation_mm: 1.0
    colocation_centroid_kp: Scutellum
  sex_cleaning:
    enabled: true
