# Dataset name - used to pick the data to load
dataset_name: ${dataset.name}

##### Easy Access Variables #####
# if set to positive integer, overrides the default
version: ${dataset.version}
run_id: 'Testing'
load_jobid: ''
note: ''
restore_checkpoint: ''

# set default task and default training config based on dataset
defaults:
  - _self_
  - anatomy: v1
  - dataset: free_walking
  - paths: workstation
  # - train: imitation


# set the directory where the output files get saved
hydra:
  job:
      config:
        override_dirname:
          exclude_keys:
            - paths
            - version
            - dataset
            - train
            - anatomy
            - restore_checkpoint
            - gpu
            - num_gpus
            - load_jobid
            - note

  run:
    # dir: ${paths.base_dir}/${hydra:job.override_dirname}
    dir: ${paths.base_dir}/${run_id}
  sweep:
    dir: ${paths.base_dir}/${run_id}
    subdir: ${hydra.job.override_dirname}