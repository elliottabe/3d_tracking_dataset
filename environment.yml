name: 3d_tracking
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip

  # core scientific stack
  - numpy
  - pandas
  - matplotlib

  # dev / notebooks
  - black
  - ipykernel

  # graphics / windowing
  - glfw
  - glew

  # media
  - ffmpeg

  - pip:
      - hydra-core
      - h5py
      - natsort
      - nvidia-ml-py3
      - tqdm
      - psutil
      - mediapy
      - imageio[ffmpeg]
      - ray[core]
      - mujoco
      - mujoco-mjx
      - ipywidgets
      - uv
      - "jax[cpu]"

variables:
  # On macOS, GLFW is the usual working backend for MuJoCo rendering.
  MUJOCO_GL: glfw
