# Optional: minimal conda environment providing system-level libraries
# (headless OpenGL, ffmpeg, glfw) that are easier to install via conda
# than via pip on Linux clusters. Python packages themselves are managed
# by uv via pyproject.toml.
#
# Recommended workflow (Linux with GPU):
#   conda env create -f environment.yml
#   conda activate fly-3d-tracking
#   uv sync --extra cuda12         # installs all Python deps incl. JAX[cuda12]
#
# If your system already provides headless GL + ffmpeg, you can skip conda
# entirely and just run `uv sync` in any venv with Python 3.12.
name: fly-3d-tracking
channels:
  - conda-forge
dependencies:
  - python=3.12
  - uv
  - ffmpeg
  - glew
  - mesalib
  - mesa-libgl-cos6-x86_64
  - glfw3
variables:
  MUJOCO_GL: egl
  PYOPENGL_PLATFORM: egl
